[ftp]
host = ftp.example.com
port = 21
user = myuser
password = mypassword
remote_dir = /incoming
use_tls = false
passive = true

[local]
download_dir = ./downloads

[watcher]
poll_interval_seconds = 10
state_file = ./downloaded_files.json
temp_suffix = .part
delete_remote_after_download = true
show_progress = true
ui_mode = rich
debug_tracebacks = false
log_to_file = false

[web]
enabled = true
host = 127.0.0.1
port = 8080
